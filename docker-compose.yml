version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: zapateria_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secure_password
      POSTGRES_DB: zapateria_prod
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: zapateria_app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://admin:secure_password@db:5432/zapateria_prod?schema=public
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-s3cr3t_f0r_b00tc4mp}
      - MP_ACCESS_TOKEN=${MP_ACCESS_TOKEN:-}
    depends_on:
      - db
    # Nos aseguramos de forzar las tablas (push) a la db apenas inicia el contenedor por primera vez
    command: sh -c "npx prisma db push && npm run start"

volumes:
  postgres_data:
