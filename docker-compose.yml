services:
  db:
    image: postgres:15-alpine
    container_name: zapateria_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secure_password
      POSTGRES_DB: zapateria_prod
      PGDATA: /var/tmp/pgdata
    ports:
      - "3101:5432"

  app:
    build: .
    container_name: zapateria_app
    restart: unless-stopped
    ports:
      - "3100:3000"
    environment:
      - DATABASE_URL=postgresql://admin:secure_password@db:5432/zapateria_prod?schema=public
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3100}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-s3cr3t_f0r_b00tc4mp}
      - MP_ACCESS_TOKEN=${MP_ACCESS_TOKEN:-}
    depends_on:
      - db
    # Nos aseguramos de forzar las tablas (push) a la db apenas inicia el contenedor por primera vez
    command: sh -c "npx prisma db push && npx next start -H 0.0.0.0 -p 3000"

  cron:
    image: curlimages/curl:latest
    container_name: zapateria_cron
    restart: unless-stopped
    depends_on:
      - app
    command: /bin/sh -c "while true; do curl -X POST http://app:3000/api/cron/cancel-pending; sleep 300; done"
